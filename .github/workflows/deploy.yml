name: Deploy to PythonAnywhere

# Triggers the bot's /api/deploy endpoint on every push to main, which
# fetches + hard-resets the checkout on PA to origin's tip and reinstalls
# dependencies if requirements.txt changed. The next step then reloads the
# PA worker via PythonAnywhere's API, and a final step polls /api/health
# until the pushed commit's SHA is actually being served — so "green run"
# means "the bot is running this commit", not just "the server said OK".
#
# Why reload via the API instead of /api/deploy touching the WSGI file:
# touching the WSGI file does NOT reliably reload the worker on this account
# (observed: /api/health kept serving an old commit after a successful
# touch). The GitHub runner has open outbound access, so it can call PA's
# reload API directly; the PA worker itself is behind the free-tier
# outbound whitelist and can't be relied on to reach the API.
#
# Requires these GitHub repo secrets:
#
#   PA_DEPLOY_URL    e.g. https://<your-pa-username>.pythonanywhere.com/api/deploy
#   DEPLOY_SECRET    must match the DEPLOY_SECRET in PA's .env
#   PA_API_TOKEN     PA account page -> "API token" (used only to reload the
#                    web app; username + domain are derived from PA_DEPLOY_URL)
#
# Add them in your repo: Settings -> Secrets and variables -> Actions.

on:
  push:
    branches: [main]
  workflow_dispatch:  # also allow manual triggers from the Actions tab

# Serialize deploys so a rapid sequence of pushes can't race on PA. New
# pushes cancel any in-flight run; the last commit wins — safe because
# the server always converges to origin's current tip anyway.
concurrency:
  group: pa-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger PA deploy
        # Pass secrets through env: instead of inline ${{ }} so a
        # secret value containing shell metacharacters (quotes,
        # backticks, $()...) can't alter the script. Inside the run
        # block we read them as shell variables and quote properly.
        env:
          PA_DEPLOY_URL: ${{ secrets.PA_DEPLOY_URL }}
          DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET }}
        run: |
          if [ -z "$PA_DEPLOY_URL" ] || [ -z "$DEPLOY_SECRET" ]; then
            echo "::warning::PA_DEPLOY_URL or DEPLOY_SECRET not set in repo secrets; skipping deploy."
            exit 0
          fi
          # --retry rides out PythonAnywhere's transient outbound-proxy
          # blips (which surface as a 500 from /api/deploy). Retrying is
          # safe: the endpoint is idempotent — every run converges the
          # checkout to origin's tip.
          curl -fsS -X POST \
            -H "X-Deploy-Secret: $DEPLOY_SECRET" \
            --max-time 240 \
            --retry 2 --retry-delay 10 --retry-all-errors \
            "$PA_DEPLOY_URL"

      - name: Reload the PA worker
        # /api/deploy updates the code on disk, but touching the WSGI file
        # doesn't reliably restart the worker on this account — so force the
        # reload through PythonAnywhere's API from the runner (open outbound).
        # The username and web-app domain are parsed from PA_DEPLOY_URL, so
        # the only extra secret needed is PA_API_TOKEN.
        env:
          PA_DEPLOY_URL: ${{ secrets.PA_DEPLOY_URL }}
          PA_API_TOKEN: ${{ secrets.PA_API_TOKEN }}
        run: |
          if [ -z "$PA_DEPLOY_URL" ]; then
            exit 0  # secrets not configured; the deploy step already warned
          fi
          if [ -z "$PA_API_TOKEN" ]; then
            echo "::warning::PA_API_TOKEN not set — cannot reload the PA worker via API, so new code will not go live until the worker restarts on its own. Add a PA_API_TOKEN repo secret (PA account page -> API token)."
            exit 0
          fi
          # https://user.pythonanywhere.com/api/deploy -> host + username
          base="${PA_DEPLOY_URL%/}"; base="${base%/api/deploy}"
          host="${base#*://}"; host="${host%%/*}"
          user="${host%%.*}"
          echo "Reloading web app '$host' (user '$user') via PA API ..."
          code="$(curl -sS -o /tmp/pa_reload.out -w '%{http_code}' -X POST \
            --max-time 60 --retry 2 --retry-delay 5 --retry-all-errors \
            -H "Authorization: Token $PA_API_TOKEN" \
            "https://www.pythonanywhere.com/api/v0/user/$user/webapps/$host/reload/")"
          echo "PA reload API returned HTTP $code"
          cat /tmp/pa_reload.out 2>/dev/null || true; echo
          case "$code" in
            2*) echo "Reload requested." ;;
            *) echo "::error::PA reload API returned HTTP $code — verify PA_API_TOKEN is valid for the account serving $host."; exit 1 ;;
          esac

      - name: Verify the new code is live
        env:
          PA_DEPLOY_URL: ${{ secrets.PA_DEPLOY_URL }}
        run: |
          if [ -z "$PA_DEPLOY_URL" ]; then
            exit 0  # secrets not configured; step 1 already warned
          fi
          # /api/health reports the SHA the worker is RUNNING (captured
          # at boot), so this catches every "deployed but never
          # restarted" failure mode, not just transport errors. The
          # worker reload takes ~10s after the touch.
          base="${PA_DEPLOY_URL%/}"; base="${base%/api/deploy}"
          want="OK ${GITHUB_SHA:0:7}"
          body=""
          for i in $(seq 1 12); do
            body="$(curl -sS --max-time 15 "$base/api/health" || true)"
            case "$body" in
              "$want"*) echo "Live: $body"; exit 0 ;;
            esac
            echo "  not live yet (attempt $i/12): got '$body'"
            sleep 5
          done
          echo "::error::Deploy did not go live: health reports '$body', expected '$want'"
          exit 1
